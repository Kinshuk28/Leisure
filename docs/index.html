<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#140a1f" />
<title>Meri Chandni · For Chandni</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Parisienne&family=Marcellus&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#f3ecff;
    --ink-soft:#c9b8e8;
    --gold:#e9c583;
    --gold-soft:#f6e2b3;
    --rose:#e79bb4;
    --plum-0:#0b0714;
    --plum-1:#160d24;
    --plum-2:#241436;
    --wine:#3a1730;
    --glass:rgba(255,255,255,.06);
    --serif:"EB Garamond", Georgia, serif;
    --display:"Fraunces", Georgia, serif;
    --label:"Marcellus", Georgia, serif;
    --script:"Parisienne", cursive;
    --ease:cubic-bezier(.16,1,.3,1);
  }

  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:var(--plum-0);
    color:var(--ink);
    font-family:var(--serif);
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
    position:relative;
  }

  /* animated aurora / moonlight background */
  #bg{position:fixed;inset:0;z-index:0;overflow:hidden;background:
      radial-gradient(120% 90% at 80% -10%, #2a1140 0%, transparent 55%),
      radial-gradient(120% 100% at 10% 110%, #2c1030 0%, transparent 55%),
      linear-gradient(160deg,#0b0714 0%,#160d24 45%,#1c0f2b 100%);}
  #bg .glow{position:absolute;border-radius:50%;filter:blur(70px);opacity:.5;mix-blend-mode:screen;animation:drift 26s ease-in-out infinite}
  #bg .g1{width:52vmax;height:52vmax;left:-12vmax;top:-16vmax;background:radial-gradient(circle,#5b2a6b,transparent 62%)}
  #bg .g2{width:44vmax;height:44vmax;right:-14vmax;bottom:-16vmax;background:radial-gradient(circle,#7a2f52,transparent 62%);animation-delay:-9s}
  #bg .g3{width:34vmax;height:34vmax;right:12vmax;top:6vmax;background:radial-gradient(circle,#b98a4a,transparent 64%);opacity:.28;animation-delay:-16s}
  @keyframes drift{0%,100%{transform:translate3d(0,0,0) scale(1)}33%{transform:translate3d(4vmax,3vmax,0) scale(1.08)}66%{transform:translate3d(-3vmax,-2vmax,0) scale(.96)}}
  #stars,#petals{position:fixed;inset:0;z-index:1;pointer-events:none}

  .vignette{position:fixed;inset:0;z-index:2;pointer-events:none;
    box-shadow:inset 0 0 24vmax rgba(6,3,12,.75);animation:breathe 10s ease-in-out infinite}
  @keyframes breathe{0%,100%{box-shadow:inset 0 0 24vmax rgba(6,3,12,.78)}50%{box-shadow:inset 0 0 19vmax rgba(6,3,12,.58)}}

  /* ---------- shared ---------- */
  .wrap{position:relative;z-index:5;height:100dvh;width:100%;display:flex;align-items:center;justify-content:center}
  .center{text-align:center;padding:0 7vw;max-width:960px}
  .kicker{font-family:var(--label);letter-spacing:.55em;text-transform:uppercase;font-size:clamp(.6rem,1.6vw,.78rem);color:var(--gold);opacity:.85;padding-left:.55em}
  .script{font-family:var(--script)}
  .hairline{width:0;height:1px;margin:1.6rem auto;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.7}

  /* ---------- opening / moon gate ---------- */
  #gate{position:fixed;inset:0;z-index:40;display:flex;align-items:center;justify-content:center;flex-direction:column;
    background:radial-gradient(80% 80% at 50% 40%,#1a0f2b 0%,#0b0714 75%);transition:opacity 1.2s var(--ease),visibility 1.2s}
  #gate.gone{opacity:0;visibility:hidden}
  .moon{position:relative;width:min(46vw,220px);aspect-ratio:1;border-radius:50%;
    background:radial-gradient(circle at 36% 32%,#fffaf0,#f6e6c8 42%,#d9b98a 100%);
    box-shadow:0 0 4px #fff,0 0 40px 6px rgba(246,226,179,.55),0 0 120px 30px rgba(233,197,131,.35),inset -22px -14px 44px rgba(120,86,53,.55);
    animation:moonrise 2.4s var(--ease) both, moonglow 6s ease-in-out infinite 2.4s;cursor:default}
  .moon::after{content:"";position:absolute;inset:0;border-radius:50%;background:
    radial-gradient(circle at 62% 30%,rgba(150,120,90,.35) 0 6%,transparent 7%),
    radial-gradient(circle at 40% 62%,rgba(150,120,90,.30) 0 9%,transparent 10%),
    radial-gradient(circle at 70% 66%,rgba(150,120,90,.25) 0 5%,transparent 6%);mix-blend-mode:multiply;opacity:.7}
  @keyframes moonrise{from{transform:translateY(40px) scale(.7);opacity:0;filter:blur(6px)}to{transform:none;opacity:1;filter:blur(0)}}
  @keyframes moonglow{0%,100%{box-shadow:0 0 4px #fff,0 0 40px 6px rgba(246,226,179,.55),0 0 120px 30px rgba(233,197,131,.32),inset -22px -14px 44px rgba(120,86,53,.55)}50%{box-shadow:0 0 6px #fff,0 0 56px 10px rgba(246,226,179,.7),0 0 150px 42px rgba(233,197,131,.45),inset -22px -14px 44px rgba(120,86,53,.55)}}

  #gate .gate-title{font-family:var(--script);font-size:clamp(3.4rem,12vw,7rem);line-height:1.18;margin-top:2rem;
    padding:.12em .18em .22em;overflow:visible;
    background:linear-gradient(100deg,var(--gold-soft) 0%,#fff 25%,var(--gold-soft) 45%,var(--gold) 70%,var(--gold-soft) 100%);
    background-size:220% auto;-webkit-background-clip:text;background-clip:text;color:transparent;
    opacity:0;animation:fadeUp 1.1s var(--ease) 1s both, shimmer 6s linear 2s infinite;
    filter:drop-shadow(0 4px 40px rgba(233,197,131,.28))}
  @keyframes shimmer{to{background-position:220% center}}
  #gate .gate-sub{font-family:var(--serif);font-style:italic;font-size:clamp(1rem,3.4vw,1.4rem);color:var(--ink-soft);margin-top:.4rem;opacity:0;animation:fadeUp 1.1s var(--ease) 1.35s both}
  .openbtn{margin-top:2.6rem;font-family:var(--label);letter-spacing:.32em;text-transform:uppercase;font-size:.82rem;color:#1a0f2b;
    background:linear-gradient(180deg,var(--gold-soft),var(--gold));border:none;border-radius:999px;padding:1.05em 2.6em 1.05em 2.9em;cursor:pointer;
    box-shadow:0 10px 30px rgba(233,197,131,.3);opacity:0;animation:fadeUp 1.1s var(--ease) 1.7s both;transition:transform .4s var(--ease),box-shadow .4s}
  .openbtn:hover{transform:translateY(-3px) scale(1.03);box-shadow:0 16px 44px rgba(233,197,131,.5)}
  .openbtn:active{transform:translateY(0) scale(.99)}
  .hint{margin-top:1.2rem;font-size:.9rem;color:var(--ink-soft);opacity:0;animation:fadeIn 1s ease 2.2s both}

  /* ---------- intro letter ---------- */
  #intro{position:absolute;inset:0;z-index:6;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity 1s var(--ease),visibility 1s}
  #intro.show{opacity:1;visibility:visible}
  #intro p{font-size:clamp(1.15rem,3.4vw,1.7rem);line-height:1.85;color:var(--ink);font-weight:400}
  #intro .em{color:var(--gold-soft);font-style:italic}

  /* ---------- stage / chapters ---------- */
  #stage{position:absolute;inset:0;z-index:6;opacity:0;visibility:hidden;transition:opacity 1s var(--ease),visibility 1s}
  #stage.show{opacity:1;visibility:visible}
  .chapter{position:absolute;inset:0;display:grid;grid-template-columns:1fr 1fr;align-items:center;gap:clamp(1rem,4vw,4rem);
    padding:clamp(1.2rem,5vw,4rem) clamp(1.4rem,6vw,6rem);
    opacity:0;visibility:hidden;pointer-events:none;transition:opacity .7s var(--ease),visibility .7s var(--ease)}
  .chapter.active{opacity:1;visibility:visible;pointer-events:auto}
  .chapter.reverse{grid-template-columns:1fr 1fr}
  .chapter.reverse .photo-col{order:2}
  .chapter.reverse .text-col{order:1}

  /* photo frame */
  .photo-col{display:flex;align-items:center;justify-content:center;perspective:1400px}
  .frame{position:relative;width:100%;max-width:min(42vh,440px);aspect-ratio:4/5;border-radius:14px;overflow:hidden;
    box-shadow:0 30px 70px rgba(0,0,0,.55),0 0 0 1px rgba(233,197,131,.18),0 0 0 10px rgba(255,255,255,.02);
    transform-style:preserve-3d;transition:transform .5s var(--ease)}
  .frame::after{content:"";position:absolute;inset:0;border-radius:14px;pointer-events:none;
    box-shadow:inset 0 0 60px rgba(11,7,20,.6);border:1px solid rgba(246,226,179,.14)}
  .frame::before{content:"";position:absolute;inset:0;z-index:3;pointer-events:none;
    background:linear-gradient(115deg,transparent 30%,rgba(255,255,255,.14) 45%,transparent 60%);
    transform:translateX(-120%);}
  .chapter.active .frame::before{animation:sheen 1.5s var(--ease) .7s}
  @keyframes sheen{to{transform:translateX(120%)}}
  .frame img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scale(1.25);filter:brightness(.6) saturate(.9);
    clip-path:inset(0 0 100% 0)}
  .chapter.active .frame img{animation:reveal 1.5s var(--ease) .25s forwards, kenburns 9s ease-out .9s forwards}
  @keyframes reveal{from{clip-path:inset(0 0 100% 0);filter:brightness(.5) saturate(.85)}to{clip-path:inset(0 0 0 0);filter:brightness(1) saturate(1.02)}}
  @keyframes kenburns{from{transform:scale(1.25)}to{transform:scale(1.04) translateY(-1%)}}

  /* text side */
  .text-col{max-width:min(46ch,42vw)}
  .chapter.reverse .text-col{margin-left:auto}
  .ch-index{font-family:var(--label);color:var(--gold);letter-spacing:.4em;font-size:.72rem;text-transform:uppercase;
    opacity:0;transform:translateY(14px)}
  .ch-title{font-family:var(--display);font-size:clamp(1.6rem,4.6vw,2.7rem);line-height:1.1;margin:.5rem 0 .1rem;
    color:var(--ink);opacity:0;transform:translateY(20px)}
  .ch-title .accent{font-family:var(--script);color:var(--gold-soft);font-size:1.25em;display:inline-block}
  .ch-rule{width:0;height:1px;background:linear-gradient(90deg,var(--gold),transparent);margin:1.1rem 0 1.3rem}
  .ch-body{font-size:clamp(1.02rem,2.5vw,1.28rem);line-height:1.85;color:var(--ink-soft);opacity:0;transform:translateY(20px)}
  .ch-body .hl{color:var(--gold-soft);font-style:italic}
  .ch-sign{margin-top:1.4rem;font-family:var(--script);font-size:1.6rem;color:var(--rose);opacity:0;transform:translateY(20px)}
  .chapter.active .ch-index{animation:fadeUp .9s var(--ease) .55s both}
  .chapter.active .ch-title{animation:fadeUp .9s var(--ease) .7s both}
  .chapter.active .ch-rule{animation:growRule 1s var(--ease) .95s both}
  .chapter.active .ch-body{animation:fadeUp .9s var(--ease) 1.05s both}
  .chapter.active .ch-sign{animation:fadeUp .9s var(--ease) 1.35s both}
  @keyframes growRule{to{width:70%}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
  @keyframes fadeIn{to{opacity:1}}

  /* ---------- controls ---------- */
  #hud{position:fixed;left:0;right:0;bottom:max(1.4rem,env(safe-area-inset-bottom));z-index:20;
    display:flex;align-items:center;justify-content:center;gap:1.4rem;opacity:0;visibility:hidden;transition:opacity .8s}
  #hud.show{opacity:1;visibility:visible}
  .navbtn{width:52px;height:52px;border-radius:50%;border:1px solid rgba(246,226,179,.28);background:var(--glass);
    color:var(--gold-soft);font-size:1.2rem;cursor:pointer;backdrop-filter:blur(8px);
    display:flex;align-items:center;justify-content:center;transition:all .35s var(--ease)}
  .navbtn:hover{background:rgba(233,197,131,.16);transform:scale(1.08);border-color:var(--gold)}
  .navbtn:disabled{opacity:.25;cursor:default;transform:none}
  .moons{display:flex;gap:.55rem;align-items:center}
  .mp{width:12px;height:12px;border-radius:50%;background:transparent;border:1px solid rgba(246,226,179,.4);position:relative;overflow:hidden;transition:.4s}
  .mp::after{content:"";position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 35% 32%,#fff,var(--gold));transform:translateX(-100%);transition:transform .5s var(--ease)}
  .mp.filled::after{transform:translateX(0)}
  .mp.current{box-shadow:0 0 12px 2px rgba(246,226,179,.6);transform:scale(1.25)}

  /* ---------- finale ---------- */
  #finale{position:absolute;inset:0;z-index:6;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity 1.2s var(--ease),visibility 1.2s}
  #finale.show{opacity:1;visibility:visible}
  #finale .big{font-family:var(--script);font-size:clamp(2.6rem,10vw,6rem);line-height:1;
    background:linear-gradient(180deg,#fff,var(--gold-soft) 55%,var(--rose));-webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 8px 60px rgba(233,197,131,.25)}
  #finale .type{min-height:2.4em;font-size:clamp(1.05rem,3vw,1.5rem);font-style:italic;color:var(--ink);margin-top:1.4rem}
  #finale .type .cursor{display:inline-block;width:2px;height:1.1em;background:var(--gold);margin-left:2px;vertical-align:-2px;animation:blink 1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
  .replay{margin-top:2.4rem;font-family:var(--label);letter-spacing:.28em;text-transform:uppercase;font-size:.74rem;color:var(--gold-soft);
    background:transparent;border:1px solid rgba(246,226,179,.4);border-radius:999px;padding:.9em 2em;cursor:pointer;transition:.35s;opacity:0}
  .replay.show{opacity:1}
  .replay:hover{background:rgba(233,197,131,.14);border-color:var(--gold)}

  /* ---------- added polish ---------- */
  /* cursor-follow moonlight glow */
  #cursorglow{position:fixed;top:0;left:0;width:420px;height:420px;z-index:3;pointer-events:none;border-radius:50%;
    transform:translate(-50%,-50%);opacity:0;transition:opacity .6s ease;
    background:radial-gradient(circle,rgba(246,226,179,.10),rgba(231,155,180,.06) 40%,transparent 70%);mix-blend-mode:screen}
  body.has-cursor #cursorglow{opacity:1}

  /* animated shimmer on chapter accents */
  .ch-title .accent{background:linear-gradient(100deg,var(--gold-soft),#fff 30%,var(--gold-soft) 55%,var(--gold) 80%,var(--gold-soft));
    background-size:220% auto;-webkit-background-clip:text;background-clip:text;color:transparent;
    animation:shimmer 7s linear infinite}

  /* signature ornament (no dashes) */
  .ch-sign::before{content:"\2661";margin-right:.35em;font-size:.8em;color:var(--gold);-webkit-text-fill-color:var(--gold);vertical-align:.05em}

  /* gold corner accents that draw onto the frame */
  .frame .corner{position:absolute;width:26px;height:26px;z-index:4;pointer-events:none;opacity:0}
  .frame .corner::before,.frame .corner::after{content:"";position:absolute;background:linear-gradient(90deg,var(--gold),transparent)}
  .frame .corner::before{width:100%;height:1.5px}
  .frame .corner::after{width:1.5px;height:100%;background:linear-gradient(180deg,var(--gold),transparent)}
  .frame .c-tl{top:9px;left:9px}
  .frame .c-tr{top:9px;right:9px;transform:scaleX(-1)}
  .frame .c-bl{bottom:9px;left:9px;transform:scaleY(-1)}
  .frame .c-br{bottom:9px;right:9px;transform:scale(-1)}
  .chapter.active .frame .corner{animation:cornerIn .8s var(--ease) 1.1s forwards}
  @keyframes cornerIn{from{opacity:0;transform:translate(var(--cx,-6px),var(--cy,-6px)) scale(.6)}to{opacity:.9}}
  .frame .c-tr{--cx:6px}.frame .c-bl{--cy:6px}.frame .c-br{--cx:6px;--cy:6px}

  /* open button pulsing ring */
  .openbtn{position:relative}
  .openbtn::after{content:"";position:absolute;inset:-2px;border-radius:999px;border:1px solid var(--gold);opacity:0;
    animation:ring 2.6s ease-out 2.4s infinite}
  @keyframes ring{0%{opacity:.6;transform:scale(1)}100%{opacity:0;transform:scale(1.35)}}

  /* intro continue cue */
  .continue-cue{margin-top:2.4rem;display:inline-flex;align-items:center;gap:.55rem;color:var(--gold-soft);
    font-family:var(--label);letter-spacing:.35em;text-transform:uppercase;font-size:.66rem;opacity:0;
    animation:fadeIn 1.2s ease 2.6s forwards}
  .continue-cue i{font-style:normal;font-size:1.4rem;line-height:1;animation:nudge 1.8s var(--ease) infinite}
  @keyframes nudge{0%,100%{transform:translateX(0);opacity:.6}50%{transform:translateX(6px);opacity:1}}

  /* finale closer: beating heart + final vow */
  .finale-close{margin-top:1.7rem;opacity:0;transform:translateY(14px);
    transition:opacity 1.6s var(--ease),transform 1.6s var(--ease)}
  .finale-close.in{opacity:1;transform:none}
  .finale-close .beat{font-size:2.3rem;color:var(--rose);line-height:1;
    filter:drop-shadow(0 0 16px rgba(231,155,180,.65));animation:beat 1.7s ease-in-out infinite}
  @keyframes beat{0%,100%{transform:scale(1)}12%{transform:scale(1.24)}24%{transform:scale(1)}38%{transform:scale(1.15)}52%{transform:scale(1)}}
  .finale-close .ps{margin-top:.5rem;font-family:var(--script);font-size:clamp(1.5rem,4.6vw,2.4rem);
    line-height:1.25;background:linear-gradient(180deg,#fff,var(--gold-soft) 60%,var(--rose));
    -webkit-background-clip:text;background-clip:text;color:transparent}

  /* finale stacked lines */
  #finale .type{min-height:6.5em;display:flex;flex-direction:column;gap:.5rem;align-items:center;margin-top:1.4rem}
  #finale .type .line{font-size:clamp(1.05rem,3vw,1.5rem);font-style:italic;color:var(--ink);line-height:1.5;opacity:0;transform:translateY(8px);transition:opacity .6s var(--ease),transform .6s var(--ease)}
  #finale .type .line.in{opacity:1;transform:none}
  #finale .type .line.done{color:var(--gold-soft)}
  #finale .type .cursor{display:inline-block;width:2px;height:1.05em;background:var(--gold);margin-left:3px;vertical-align:-2px;animation:blink 1s steps(1) infinite}

  /* music toggle with live equalizer */
  .music-toggle{position:fixed;top:max(1.3rem,env(safe-area-inset-top));right:max(1.3rem,env(safe-area-inset-top));z-index:22;
    width:46px;height:46px;border-radius:50%;border:1px solid rgba(246,226,179,.32);background:var(--glass);backdrop-filter:blur(8px);
    display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transform:scale(.7);
    transition:opacity .6s var(--ease),transform .6s var(--ease),background .3s,border-color .3s}
  .music-toggle.show{opacity:1;transform:scale(1)}
  .music-toggle:hover{background:rgba(233,197,131,.16);border-color:var(--gold)}
  .music-toggle .eq{display:flex;align-items:flex-end;gap:2.5px;height:16px}
  .music-toggle .eq i{width:2.5px;height:100%;border-radius:2px;background:linear-gradient(180deg,var(--gold-soft),var(--gold));
    transform-origin:bottom;animation:eqbar 1s ease-in-out infinite}
  .music-toggle .eq i:nth-child(1){animation-delay:-.2s}
  .music-toggle .eq i:nth-child(2){animation-delay:-.5s}
  .music-toggle .eq i:nth-child(3){animation-delay:-.1s}
  .music-toggle .eq i:nth-child(4){animation-delay:-.7s}
  @keyframes eqbar{0%,100%{transform:scaleY(.28)}50%{transform:scaleY(1)}}
  /* muted: freeze the bars low and dim */
  .music-toggle.muted .eq i{animation-play-state:paused;transform:scaleY(.28);opacity:.55}
  .music-toggle.muted{border-color:rgba(246,226,179,.2)}
  .music-toggle.muted::after{content:"";position:absolute;width:30px;height:1.5px;background:var(--gold-soft);transform:rotate(-45deg);opacity:.8;border-radius:2px}

  /* mobile */
  @media (max-width:820px){
    body{overflow:hidden}
    .chapter,.chapter.reverse{grid-template-columns:1fr;grid-template-rows:auto auto;align-content:center;gap:1.4rem;text-align:center;
      padding:calc(3.5rem + env(safe-area-inset-top)) 1.6rem calc(6rem + env(safe-area-inset-bottom))}
    .chapter .photo-col,.chapter.reverse .photo-col{order:1}
    .chapter .text-col,.chapter.reverse .text-col{order:2;max-width:100%;margin:0 auto}
    .frame{max-width:min(64vw,300px)}
    .ch-rule,.chapter.active .ch-rule{margin-left:auto;margin-right:auto}
    @keyframes growRule{to{width:46%}}
    .ch-body{font-size:1.06rem}
  }
  @media (max-height:560px) and (min-width:821px){.frame{max-width:min(60vh,320px)}}

  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001s!important;animation-delay:0s!important;transition-duration:.2s!important}
    .frame img{clip-path:none!important;transform:scale(1.04)!important;filter:none!important}
  }
</style>
</head>
<body>
  <div id="bg"><span class="glow g1"></span><span class="glow g2"></span><span class="glow g3"></span></div>
  <canvas id="stars"></canvas>
  <canvas id="petals"></canvas>
  <div class="vignette"></div>
  <div id="cursorglow" aria-hidden="true"></div>

  <!-- background music: drop the track at assets/audio/lae-dooba.mp3 -->
  <audio id="bgm" loop preload="auto">
    <source src="assets/audio/lae-dooba.mp3" type="audio/mpeg" />
    <source src="assets/audio/lae-dooba.m4a" type="audio/mp4" />
    <source src="assets/audio/lae-dooba.ogg" type="audio/ogg" />
  </audio>
  <button id="musicToggle" class="music-toggle" aria-label="Pause music" hidden>
    <span class="eq"><i></i><i></i><i></i><i></i></span>
  </button>

  <!-- GATE -->
  <section id="gate">
    <div class="moon" aria-hidden="true"></div>
    <h1 class="gate-title">Chandni</h1>
    <p class="gate-sub">for my moonlight, meri chandni</p>
    <button class="openbtn" id="openBtn">Open your heart</button>
    <p class="hint">made with all of mine · use ← → or tap the arrows</p>
  </section>

  <!-- INTRO -->
  <section id="intro" class="wrap">
    <div class="center">
      <p class="kicker">before we begin</p>
      <div class="hairline" style="animation:growHair 1.4s var(--ease) .3s forwards"></div>
      <p id="introText"></p>
      <div class="continue-cue" aria-hidden="true"><span>continue</span><i>&#8250;</i></div>
    </div>
  </section>

  <!-- STAGE (chapters injected by JS) -->
  <section id="stage"></section>

  <!-- FINALE -->
  <section id="finale" class="wrap">
    <div class="center">
      <p class="kicker">and always</p>
      <div class="hairline" style="width:60%"></div>
      <div class="big">I love you, Chandni</div>
      <div class="type" id="typeLine"></div>
      <div class="finale-close" id="finaleClose">
        <div class="beat" aria-hidden="true">&#10084;</div>
        <p class="ps">I would choose you. In this life, and in every one after.</p>
      </div>
      <button class="replay" id="replayBtn">relive it from the start</button>
    </div>
  </section>

  <!-- HUD -->
  <div id="hud">
    <button class="navbtn" id="prevBtn" aria-label="previous">&#8249;</button>
    <div class="moons" id="moons"></div>
    <button class="navbtn" id="nextBtn" aria-label="next">&#8250;</button>
  </div>

  <style>@keyframes growHair{to{width:120px}}</style>

<script>
/* =========================================================================
   YOUR STORY LIVES HERE.
   Edit the `title`, `body`, and `sign` of each chapter freely.
   - Wrap words in <span class="hl">...</span> to make them glow gold.
   - `img` points to the photo. `reverse:true` puts the photo on the right.
   ========================================================================= */
const CHAPTERS = [
  {
    img:"assets/img/chandni-portrait.jpg",
    title:'The girl named <span class="accent">Moonlight</span>',
    body:'Your parents named you Chandni, which means <span class="hl">moonlight</span>, long before they knew how right they would be. This was the very first birthday I got to celebrate with you, and standing there watching you glow under the night, I understood the name completely. On the darkest nights, you are the softest, steadiest light I have.',
    sign:"the first birthday of ours that I got to keep",
    reverse:false
  },
  {
    img:"assets/img/cycle-garden.jpg",
    title:'That <span class="accent">laugh</span>',
    body:'You on that cycle, head thrown back, the whole garden in bloom behind you. This is the laugh I would cross any distance for. When you are happy like this, <span class="hl">the whole world feels lighter.</span>',
    sign:"keep laughing, I will keep watching",
    reverse:false
  },
  {
    img:"assets/img/cloud-cafe.jpg",
    title:'First trip to <span class="accent">Indore</span>',
    body:'This was the first time I came all the way to Indore to see you, right after you started your new job there. A new city, a whole new life, and all I wanted was to be a part of it. We ended up here under a ceiling of soft lights, and I remember thinking <span class="hl">I would travel anywhere just to sit across from you.</span>',
    sign:"the first of many trains and flights to you",
    reverse:true
  },
  {
    img:"assets/img/sultanpur-night.jpg",
    title:'Thirty-second <span class="accent">Avenue</span>',
    body:'Your very first birthday with me, the two of us wandering around 32nd Avenue in Gurgaon with the whole place glowing around us. Every single light was strung up above us, and still you were the brightest thing there. I could spend a thousand ordinary nights like this and call every one of them <span class="hl">the best night of my life.</span>',
    sign:"my favourite person in any crowd",
    reverse:false
  },
  {
    img:"assets/img/wedding-gala.jpg",
    title:'Our first <span class="accent">date</span>',
    body:'Our very first date, and of all the places in the world it turned out to be your office party from back when you were at Deloitte. I still laugh about that. I was nervous and proud all at once, walking in beside you. You in that gown, me trying my best to look like I belonged, and honestly <span class="hl">I would relive that slightly awkward, completely perfect night a hundred times over.</span>',
    sign:"proudest date at the whole party",
    reverse:true
  },
  {
    img:"assets/img/beach-dinner.jpg",
    title:'The iced <span class="accent">latte</span>',
    body:'On my most recent trip to Indore we found this cafe, and you ordered an iced latte with no sugar, of course, because you always demand everything with no sugar. Then you took one sip, made that face, and slowly realised you actually do like sugar after all. I laughed so hard watching you sit there, quietly betrayed by your own order. <span class="hl">I fall for you all over again in moments this small.</span>',
    sign:"still laughing about that one sip",
    reverse:false
  },
  {
    img:"assets/img/perfume-shop.jpg",
    title:'Your <span class="accent">hometown</span>',
    body:'The first time you took me to your hometown, you brought me to the Paras Perfumes factory. Someone was walking us through all the different oils they use, and somewhere in the middle of it I turned and quietly took this photo of you. A whole room full of scents, and you were still the only thing I wanted to remember. <span class="hl">Being let into your world is my favourite place to be.</span>',
    sign:"home is wherever you show me",
    reverse:true
  },
  {
    img:"assets/img/gold-mirror.jpg",
    title:'Accidentally <span class="accent">matching</span>',
    body:'This was from that first trip to Indore too, where without planning a single thing we both turned up dressed head to toe in black. No texts, no coordinating, just two people who somehow keep landing on the exact same page. We caught ourselves in this gold mirror and I thought, <span class="hl">of course we match, we always have.</span>',
    sign:"same wavelength, always",
    reverse:false
  },
  {
    img:"assets/img/portugal-jersey.jpg",
    title:'My favourite <span class="accent">teammate</span>',
    body:'Right before the World Cup began I got us both Portugal jerseys, because if you know me at all you know I ride for Ronaldo. You do not even watch football, but you put it on for me anyway and sat through Portugal match after Portugal match right by my side. That is the kind of love that gets me. <span class="hl">You show up for the things I love, simply because they are mine.</span>',
    sign:"você e eu, sempre",
    reverse:true
  },
  {
    img:"assets/img/anime-cap.jpg",
    title:'How I <span class="accent">see</span> you',
    body:'Okay, this one does not have a grand story behind it. I made this little Ghibli version of you with some AI one afternoon, just because I loved the idea of seeing you drawn as soft and warm as you actually feel to me. No occasion, no reason, just you living rent free in my head, as usual. <span class="hl">Even my idlest afternoons somehow end up being about you.</span>',
    sign:"forever yours, forever amazed",
    reverse:false
  }
];

const INTRO_TEXT = 'Chandni, I am not very good at saying the big things out loud, so I built you this instead. A quiet little world made only of you. Take your time. <span class="em">There is no rush when it comes to us.</span>';
const FINALE_LINES = [
  "Thank you for being my calm and my chaos.",
  "For every laugh, every trip, every ordinary evening.",
  "You are my moonlight, and I am, endlessly, yours."
];

/* ===================== ENGINE (no need to edit below) ===================== */
(function(){
  const stage=document.getElementById('stage');
  const gate=document.getElementById('gate');
  const intro=document.getElementById('intro');
  const finale=document.getElementById('finale');
  const hud=document.getElementById('hud');
  const moonsWrap=document.getElementById('moons');
  const prevBtn=document.getElementById('prevBtn');
  const nextBtn=document.getElementById('nextBtn');
  const roman=n=>['I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII','XIII','XIV'][n]||(n+1);

  // build chapters
  CHAPTERS.forEach((c,i)=>{
    const sec=document.createElement('article');
    sec.className='chapter'+(c.reverse?' reverse':'');
    sec.dataset.i=i;
    sec.innerHTML=`
      <div class="photo-col"><div class="frame"><img src="${c.img}" alt="A memory of Chandni" loading="${i<2?'eager':'lazy'}"><span class="corner c-tl"></span><span class="corner c-tr"></span><span class="corner c-bl"></span><span class="corner c-br"></span></div></div>
      <div class="text-col">
        <div class="ch-index">${c.index||('Chapter '+roman(i))}</div>
        <h2 class="ch-title">${c.title}</h2>
        <div class="ch-rule"></div>
        <p class="ch-body">${c.body}</p>
        <div class="ch-sign">${c.sign||''}</div>
      </div>`;
    stage.appendChild(sec);
    const m=document.createElement('span');m.className='mp';m.dataset.i=i;moonsWrap.appendChild(m);
  });
  const chapters=[...document.querySelectorAll('.chapter')];

  // states: -2 gate, -1 intro, 0..n-1 chapters, n finale
  let idx=-2, busy=false;
  const N=chapters.length;

  function setMoons(active){
    moonsWrap.querySelectorAll('.mp').forEach((m,i)=>{
      m.classList.toggle('filled', i<=active && active>=0);
      m.classList.toggle('current', i===active);
    });
  }

  function showChapter(i){
    chapters.forEach(ch=>ch.classList.remove('active'));
    // force reflow so re-entering a chapter replays animation
    const el=chapters[i]; void el.offsetWidth; el.classList.add('active');
    setMoons(i);
    prevBtn.disabled=false; nextBtn.disabled=false;
  }

  function go(target){
    if(busy) return;
    target=Math.max(-1,Math.min(N,target));
    if(target===idx) return;
    busy=true; setTimeout(()=>busy=false,650);

    intro.classList.toggle('show', target===-1);
    stage.classList.toggle('show', target>=0 && target<N);
    finale.classList.toggle('show', target===N);
    hud.classList.toggle('show', target>=-1 && target<N);

    if(target>=0 && target<N) showChapter(target);
    if(target===N) runFinale();
    if(target===-1) startIntroText();

    idx=target;
    prevBtn.disabled = idx<=-1;
    nextBtn.disabled = false;
  }

  // buttons / keys / swipe
  nextBtn.addEventListener('click',()=>go(idx+1));
  prevBtn.addEventListener('click',()=>go(idx-1));
  window.addEventListener('keydown',e=>{
    if(gate.classList.contains('gone')===false) { if(e.key==='Enter'||e.key===' ') openGate(); return; }
    if(e.key==='ArrowRight'||e.key==='PageDown') go(idx+1);
    if(e.key==='ArrowLeft'||e.key==='PageUp') go(idx-1);
  });
  let tsx=0,tsy=0;
  window.addEventListener('touchstart',e=>{tsx=e.changedTouches[0].clientX;tsy=e.changedTouches[0].clientY;},{passive:true});
  window.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-tsx, dy=e.changedTouches[0].clientY-tsy;
    if(Math.abs(dx)>55 && Math.abs(dx)>Math.abs(dy)){ go(idx + (dx<0?1:-1)); }
  },{passive:true});
  // wheel (debounced) for desktop scroll
  let wlock=false;
  window.addEventListener('wheel',e=>{
    if(idx<-1) return;
    if(wlock) return; if(Math.abs(e.deltaY)<12) return;
    wlock=true; setTimeout(()=>wlock=false,700);
    go(idx + (e.deltaY>0?1:-1));
  },{passive:true});

  // parallax tilt on active frame + cursor-follow glow
  const cursorGlow=document.getElementById('cursorglow');
  window.addEventListener('mousemove',e=>{
    document.body.classList.add('has-cursor');
    cursorGlow.style.left=e.clientX+'px';
    cursorGlow.style.top=e.clientY+'px';
    const f=document.querySelector('.chapter.active .frame'); if(!f) return;
    const rx=(e.clientY/innerHeight-.5)*-6, ry=(e.clientX/innerWidth-.5)*8;
    f.style.transform=`rotateX(${rx}deg) rotateY(${ry}deg)`;
  });

  // intro typing-ish reveal
  const introText=document.getElementById('introText');
  let introStarted=false;
  function startIntroText(){
    if(introStarted) return; introStarted=true;
    introText.innerHTML=INTRO_TEXT;
    introText.style.opacity=0; introText.style.transform='translateY(18px)';
    introText.style.transition='opacity 1.6s var(--ease) .5s, transform 1.6s var(--ease) .5s';
    requestAnimationFrame(()=>{introText.style.opacity=1;introText.style.transform='none';});
  }

  // finale typewriter
  const typeLine=document.getElementById('typeLine');
  const replayBtn=document.getElementById('replayBtn');
  let finaleRun=false;
  function runFinale(){
    if(finaleRun) return; finaleRun=true;
    burst();
    typeLine.innerHTML='';
    let li=0;
    function nextLine(){
      if(li>=FINALE_LINES.length){
        const fc=document.getElementById('finaleClose');
        setTimeout(()=>{ fc.classList.add('in'); burst(); },600);
        setTimeout(()=>replayBtn.classList.add('show'),2600);
        return;
      }
      const text=FINALE_LINES[li];
      const line=document.createElement('p');
      line.className='line';
      const span=document.createElement('span');
      const cur=document.createElement('span'); cur.className='cursor';
      line.appendChild(span); line.appendChild(cur);
      typeLine.appendChild(line);
      // fade the new (empty) line in, then type into it while previous lines stay
      requestAnimationFrame(()=>line.classList.add('in'));
      let ci=0;
      const tick=setInterval(()=>{
        ci++; span.textContent=text.slice(0,ci);
        if(ci>=text.length){
          clearInterval(tick);
          cur.remove();               // drop cursor, keep the finished line in place
          line.classList.add('done');
          li++; setTimeout(nextLine,900);
        }
      },40);
    }
    setTimeout(nextLine,700);
  }
  replayBtn.addEventListener('click',()=>{ finaleRun=false; replayBtn.classList.remove('show'); typeLine.innerHTML=''; document.getElementById('finaleClose').classList.remove('in'); go(-1); });

  // ---------- background music ----------
  const bgm=document.getElementById('bgm');
  const musicToggle=document.getElementById('musicToggle');
  const TARGET_VOL=0.32;
  let musicOn=false, fadeTimer=null;
  function fadeVol(to,ms){
    clearInterval(fadeTimer);
    const from=bgm.volume, steps=Math.max(1,Math.round(ms/40)); let i=0;
    fadeTimer=setInterval(()=>{
      i++; bgm.volume=Math.min(1,Math.max(0,from+(to-from)*(i/steps)));
      if(i>=steps){ clearInterval(fadeTimer); if(to===0){ try{bgm.pause();}catch(e){} } }
    },40);
  }
  function startMusic(){
    // only meaningful if a track file is actually present
    bgm.volume=0;
    const pr=bgm.play();
    if(pr&&pr.then){
      pr.then(()=>{ musicOn=true; musicToggle.hidden=false;
        requestAnimationFrame(()=>musicToggle.classList.add('show'));
        musicToggle.classList.remove('muted'); musicToggle.setAttribute('aria-label','Pause music');
        fadeVol(TARGET_VOL,2600);
      }).catch(()=>{ /* no file yet or autoplay blocked; toggle stays hidden */ });
    }
  }
  musicToggle.addEventListener('click',()=>{
    if(musicOn){ musicOn=false; musicToggle.classList.add('muted'); musicToggle.setAttribute('aria-label','Play music'); fadeVol(0,600); }
    else{ const pr=bgm.play(); if(pr&&pr.then) pr.then(()=>{ musicOn=true; musicToggle.classList.remove('muted'); musicToggle.setAttribute('aria-label','Pause music'); fadeVol(TARGET_VOL,1200); }).catch(()=>{}); }
  });

  // gate
  function openGate(){
    gate.classList.add('gone');
    startMusic();
    setTimeout(()=>go(-1),700);
  }
  document.getElementById('openBtn').addEventListener('click',openGate);

  /* ---------- starfield ---------- */
  const sc=document.getElementById('stars'), sx=sc.getContext('2d');
  let stars=[];
  function initStars(){
    sc.width=innerWidth; sc.height=innerHeight;
    const n=Math.min(150, Math.floor(innerWidth*innerHeight/9000));
    stars=Array.from({length:n},()=>({x:Math.random()*sc.width,y:Math.random()*sc.height,
      r:Math.random()*1.3+.2,tw:Math.random()*Math.PI*2,sp:Math.random()*.02+.005}));
  }
  function drawStars(){
    sx.clearRect(0,0,sc.width,sc.height);
    for(const s of stars){ s.tw+=s.sp; const a=.35+Math.sin(s.tw)*.35;
      sx.beginPath(); sx.arc(s.x,s.y,s.r,0,7); sx.fillStyle=`rgba(255,246,224,${a})`; sx.fill(); }
    requestAnimationFrame(drawStars);
  }

  /* ---------- floating petals / motes ---------- */
  const pc=document.getElementById('petals'), px=pc.getContext('2d');
  let motes=[];
  function initPetals(){
    pc.width=innerWidth; pc.height=innerHeight;
    const n=Math.min(34, Math.floor(innerWidth/40));
    motes=Array.from({length:n},()=>spawn(true));
  }
  function spawn(rand){
    return {x:Math.random()*pc.width, y:rand?Math.random()*pc.height:pc.height+20,
      s:Math.random()*7+3, vy:-(Math.random()*.35+.12), vx:(Math.random()-.5)*.35,
      rot:Math.random()*Math.PI, vr:(Math.random()-.5)*.02, a:Math.random()*.5+.25,
      heart:Math.random()<.38,
      hue:Math.random()<.5?'233,197,131':'231,155,180'};
  }
  function heartPath(g,r){
    g.beginPath();
    g.moveTo(0,r*.35);
    g.bezierCurveTo(0,-r*.1, -r, -r*.15, -r, r*.35);
    g.bezierCurveTo(-r, r, -r*.15, r*1.05, 0, r*1.5);
    g.bezierCurveTo(r*.15, r*1.05, r, r, r, r*.35);
    g.bezierCurveTo(r, -r*.15, 0, -r*.1, 0, r*.35);
    g.closePath();
  }
  function drawPetals(){
    px.clearRect(0,0,pc.width,pc.height);
    for(const m of motes){
      m.x+=m.vx; m.y+=m.vy; m.rot+=m.vr; m.x+=Math.sin(m.y*.01)*.3;
      if(m.y<-20||m.x<-30||m.x>pc.width+30){ Object.assign(m,spawn(false)); }
      px.save(); px.translate(m.x,m.y); px.rotate(m.rot);
      px.fillStyle=`rgba(${m.hue},${m.a})`; px.shadowColor=`rgba(${m.hue},.6)`; px.shadowBlur=8;
      if(m.heart){ heartPath(px,m.s*.8); }
      else{ px.beginPath(); px.ellipse(0,0,m.s,m.s*.55,0,0,7); }
      px.fill();
      px.restore();
    }
    requestAnimationFrame(drawPetals);
  }

  // celebratory burst at finale
  function burst(){
    for(let i=0;i<40;i++){ const m=spawn(false); m.y=pc.height*.5; m.x=pc.width*.5;
      m.vy=-(Math.random()*2+.5); m.vx=(Math.random()-.5)*4; m.a=.8; motes.push(m); }
    if(motes.length>90) motes.splice(0,motes.length-90);
  }

  function resize(){ initStars(); initPetals(); }
  window.addEventListener('resize',()=>{ clearTimeout(window._rz); window._rz=setTimeout(resize,200); });

  initStars(); initPetals();
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  drawStars(); if(!reduce) drawPetals();

  // preload chapter images
  CHAPTERS.forEach(c=>{ const im=new Image(); im.src=c.img; });
})();
</script>
</body>
</html>
