<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#140a1f" />
<title>Meri Chandni · For Chandni</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Marcellus&family=Great+Vibes&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#f3ecff;
    --ink-soft:#c9b8e8;
    --gold:#e9c583;
    --gold-soft:#f6e2b3;
    --rose:#e79bb4;
    --plum-0:#0b0714;
    --plum-1:#160d24;
    --plum-2:#241436;
    --wine:#3a1730;
    --glass:rgba(255,255,255,.06);
    --serif:"Cormorant Garamond", Georgia, serif;
    --display:"Marcellus", Georgia, serif;
    --script:"Great Vibes", cursive;
    --ease:cubic-bezier(.16,1,.3,1);
  }

  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:var(--plum-0);
    color:var(--ink);
    font-family:var(--serif);
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
    position:relative;
  }

  /* animated aurora / moonlight background */
  #bg{position:fixed;inset:0;z-index:0;overflow:hidden;background:
      radial-gradient(120% 90% at 80% -10%, #2a1140 0%, transparent 55%),
      radial-gradient(120% 100% at 10% 110%, #2c1030 0%, transparent 55%),
      linear-gradient(160deg,#0b0714 0%,#160d24 45%,#1c0f2b 100%);}
  #bg .glow{position:absolute;border-radius:50%;filter:blur(70px);opacity:.5;mix-blend-mode:screen;animation:drift 26s ease-in-out infinite}
  #bg .g1{width:52vmax;height:52vmax;left:-12vmax;top:-16vmax;background:radial-gradient(circle,#5b2a6b,transparent 62%)}
  #bg .g2{width:44vmax;height:44vmax;right:-14vmax;bottom:-16vmax;background:radial-gradient(circle,#7a2f52,transparent 62%);animation-delay:-9s}
  #bg .g3{width:34vmax;height:34vmax;right:12vmax;top:6vmax;background:radial-gradient(circle,#b98a4a,transparent 64%);opacity:.28;animation-delay:-16s}
  @keyframes drift{0%,100%{transform:translate3d(0,0,0) scale(1)}33%{transform:translate3d(4vmax,3vmax,0) scale(1.08)}66%{transform:translate3d(-3vmax,-2vmax,0) scale(.96)}}
  #stars,#petals{position:fixed;inset:0;z-index:1;pointer-events:none}

  .vignette{position:fixed;inset:0;z-index:2;pointer-events:none;
    box-shadow:inset 0 0 24vmax rgba(6,3,12,.75);}

  /* ---------- shared ---------- */
  .wrap{position:relative;z-index:5;height:100dvh;width:100%;display:flex;align-items:center;justify-content:center}
  .center{text-align:center;padding:0 7vw;max-width:960px}
  .kicker{font-family:var(--display);letter-spacing:.55em;text-transform:uppercase;font-size:clamp(.6rem,1.6vw,.78rem);color:var(--gold);opacity:.85;padding-left:.55em}
  .script{font-family:var(--script)}
  .hairline{width:0;height:1px;margin:1.6rem auto;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.7}

  /* ---------- opening / moon gate ---------- */
  #gate{position:fixed;inset:0;z-index:40;display:flex;align-items:center;justify-content:center;flex-direction:column;
    background:radial-gradient(80% 80% at 50% 40%,#1a0f2b 0%,#0b0714 75%);transition:opacity 1.2s var(--ease),visibility 1.2s}
  #gate.gone{opacity:0;visibility:hidden}
  .moon{position:relative;width:min(46vw,220px);aspect-ratio:1;border-radius:50%;
    background:radial-gradient(circle at 36% 32%,#fffaf0,#f6e6c8 42%,#d9b98a 100%);
    box-shadow:0 0 4px #fff,0 0 40px 6px rgba(246,226,179,.55),0 0 120px 30px rgba(233,197,131,.35),inset -22px -14px 44px rgba(120,86,53,.55);
    animation:moonrise 2.4s var(--ease) both, moonglow 6s ease-in-out infinite 2.4s;cursor:default}
  .moon::after{content:"";position:absolute;inset:0;border-radius:50%;background:
    radial-gradient(circle at 62% 30%,rgba(150,120,90,.35) 0 6%,transparent 7%),
    radial-gradient(circle at 40% 62%,rgba(150,120,90,.30) 0 9%,transparent 10%),
    radial-gradient(circle at 70% 66%,rgba(150,120,90,.25) 0 5%,transparent 6%);mix-blend-mode:multiply;opacity:.7}
  @keyframes moonrise{from{transform:translateY(40px) scale(.7);opacity:0;filter:blur(6px)}to{transform:none;opacity:1;filter:blur(0)}}
  @keyframes moonglow{0%,100%{box-shadow:0 0 4px #fff,0 0 40px 6px rgba(246,226,179,.55),0 0 120px 30px rgba(233,197,131,.32),inset -22px -14px 44px rgba(120,86,53,.55)}50%{box-shadow:0 0 6px #fff,0 0 56px 10px rgba(246,226,179,.7),0 0 150px 42px rgba(233,197,131,.45),inset -22px -14px 44px rgba(120,86,53,.55)}}

  #gate .gate-title{font-family:var(--script);font-size:clamp(3rem,11vw,6.2rem);line-height:.9;margin-top:2.2rem;
    background:linear-gradient(180deg,#fff,var(--gold-soft) 60%,var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent;
    opacity:0;animation:fadeUp 1.1s var(--ease) 1s both;text-shadow:0 4px 40px rgba(233,197,131,.25)}
  #gate .gate-sub{font-family:var(--serif);font-style:italic;font-size:clamp(1rem,3.4vw,1.4rem);color:var(--ink-soft);margin-top:.4rem;opacity:0;animation:fadeUp 1.1s var(--ease) 1.35s both}
  .openbtn{margin-top:2.6rem;font-family:var(--display);letter-spacing:.32em;text-transform:uppercase;font-size:.82rem;color:#1a0f2b;
    background:linear-gradient(180deg,var(--gold-soft),var(--gold));border:none;border-radius:999px;padding:1.05em 2.6em 1.05em 2.9em;cursor:pointer;
    box-shadow:0 10px 30px rgba(233,197,131,.3);opacity:0;animation:fadeUp 1.1s var(--ease) 1.7s both;transition:transform .4s var(--ease),box-shadow .4s}
  .openbtn:hover{transform:translateY(-3px) scale(1.03);box-shadow:0 16px 44px rgba(233,197,131,.5)}
  .openbtn:active{transform:translateY(0) scale(.99)}
  .hint{margin-top:1.2rem;font-size:.9rem;color:var(--ink-soft);opacity:0;animation:fadeIn 1s ease 2.2s both}

  /* ---------- intro letter ---------- */
  #intro{position:absolute;inset:0;z-index:6;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity 1s var(--ease),visibility 1s}
  #intro.show{opacity:1;visibility:visible}
  #intro p{font-size:clamp(1.15rem,3.4vw,1.7rem);line-height:1.85;color:var(--ink);font-weight:400}
  #intro .em{color:var(--gold-soft);font-style:italic}

  /* ---------- stage / chapters ---------- */
  #stage{position:absolute;inset:0;z-index:6;opacity:0;visibility:hidden;transition:opacity 1s var(--ease),visibility 1s}
  #stage.show{opacity:1;visibility:visible}
  .chapter{position:absolute;inset:0;display:grid;grid-template-columns:1fr 1fr;align-items:center;gap:clamp(1rem,4vw,4rem);
    padding:clamp(1.2rem,5vw,4rem) clamp(1.4rem,6vw,6rem);
    opacity:0;visibility:hidden;pointer-events:none;transition:opacity .1s}
  .chapter.active{opacity:1;visibility:visible;pointer-events:auto}
  .chapter.reverse{grid-template-columns:1fr 1fr}
  .chapter.reverse .photo-col{order:2}
  .chapter.reverse .text-col{order:1}

  /* photo frame */
  .photo-col{display:flex;align-items:center;justify-content:center;perspective:1400px}
  .frame{position:relative;width:100%;max-width:min(42vh,440px);aspect-ratio:4/5;border-radius:14px;overflow:hidden;
    box-shadow:0 30px 70px rgba(0,0,0,.55),0 0 0 1px rgba(233,197,131,.18),0 0 0 10px rgba(255,255,255,.02);
    transform-style:preserve-3d;transition:transform .5s var(--ease)}
  .frame::after{content:"";position:absolute;inset:0;border-radius:14px;pointer-events:none;
    box-shadow:inset 0 0 60px rgba(11,7,20,.6);border:1px solid rgba(246,226,179,.14)}
  .frame::before{content:"";position:absolute;inset:0;z-index:3;pointer-events:none;
    background:linear-gradient(115deg,transparent 30%,rgba(255,255,255,.14) 45%,transparent 60%);
    transform:translateX(-120%);}
  .chapter.active .frame::before{animation:sheen 1.5s var(--ease) .7s}
  @keyframes sheen{to{transform:translateX(120%)}}
  .frame img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scale(1.25);filter:brightness(.6) saturate(.9);
    clip-path:inset(0 0 100% 0)}
  .chapter.active .frame img{animation:reveal 1.5s var(--ease) .25s forwards, kenburns 9s ease-out .9s forwards}
  @keyframes reveal{from{clip-path:inset(0 0 100% 0);filter:brightness(.5) saturate(.85)}to{clip-path:inset(0 0 0 0);filter:brightness(1) saturate(1.02)}}
  @keyframes kenburns{from{transform:scale(1.25)}to{transform:scale(1.04) translateY(-1%)}}

  /* text side */
  .text-col{max-width:min(46ch,42vw)}
  .chapter.reverse .text-col{margin-left:auto}
  .ch-index{font-family:var(--display);color:var(--gold);letter-spacing:.4em;font-size:.72rem;text-transform:uppercase;
    opacity:0;transform:translateY(14px)}
  .ch-title{font-family:var(--display);font-size:clamp(1.6rem,4.6vw,2.7rem);line-height:1.1;margin:.5rem 0 .1rem;
    color:var(--ink);opacity:0;transform:translateY(20px)}
  .ch-title .accent{font-family:var(--script);color:var(--gold-soft);font-size:1.25em;display:inline-block}
  .ch-rule{width:0;height:1px;background:linear-gradient(90deg,var(--gold),transparent);margin:1.1rem 0 1.3rem}
  .ch-body{font-size:clamp(1.02rem,2.5vw,1.28rem);line-height:1.85;color:var(--ink-soft);opacity:0;transform:translateY(20px)}
  .ch-body .hl{color:var(--gold-soft);font-style:italic}
  .ch-sign{margin-top:1.4rem;font-family:var(--script);font-size:1.6rem;color:var(--rose);opacity:0;transform:translateY(20px)}
  .chapter.active .ch-index{animation:fadeUp .9s var(--ease) .55s both}
  .chapter.active .ch-title{animation:fadeUp .9s var(--ease) .7s both}
  .chapter.active .ch-rule{animation:growRule 1s var(--ease) .95s both}
  .chapter.active .ch-body{animation:fadeUp .9s var(--ease) 1.05s both}
  .chapter.active .ch-sign{animation:fadeUp .9s var(--ease) 1.35s both}
  @keyframes growRule{to{width:70%}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
  @keyframes fadeIn{to{opacity:1}}

  /* ---------- controls ---------- */
  #hud{position:fixed;left:0;right:0;bottom:max(1.4rem,env(safe-area-inset-bottom));z-index:20;
    display:flex;align-items:center;justify-content:center;gap:1.4rem;opacity:0;visibility:hidden;transition:opacity .8s}
  #hud.show{opacity:1;visibility:visible}
  .navbtn{width:52px;height:52px;border-radius:50%;border:1px solid rgba(246,226,179,.28);background:var(--glass);
    color:var(--gold-soft);font-size:1.2rem;cursor:pointer;backdrop-filter:blur(8px);
    display:flex;align-items:center;justify-content:center;transition:all .35s var(--ease)}
  .navbtn:hover{background:rgba(233,197,131,.16);transform:scale(1.08);border-color:var(--gold)}
  .navbtn:disabled{opacity:.25;cursor:default;transform:none}
  .moons{display:flex;gap:.55rem;align-items:center}
  .mp{width:12px;height:12px;border-radius:50%;background:transparent;border:1px solid rgba(246,226,179,.4);position:relative;overflow:hidden;transition:.4s}
  .mp::after{content:"";position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 35% 32%,#fff,var(--gold));transform:translateX(-100%);transition:transform .5s var(--ease)}
  .mp.filled::after{transform:translateX(0)}
  .mp.current{box-shadow:0 0 12px 2px rgba(246,226,179,.6);transform:scale(1.25)}
  .counter{position:fixed;top:max(1.4rem,env(safe-area-inset-top));left:50%;transform:translateX(-50%);z-index:20;
    font-family:var(--display);letter-spacing:.3em;font-size:.72rem;color:var(--gold);opacity:0;transition:opacity .8s}
  .counter.show{opacity:.8}

  /* ---------- finale ---------- */
  #finale{position:absolute;inset:0;z-index:6;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity 1.2s var(--ease),visibility 1.2s}
  #finale.show{opacity:1;visibility:visible}
  #finale .big{font-family:var(--script);font-size:clamp(2.6rem,10vw,6rem);line-height:1;
    background:linear-gradient(180deg,#fff,var(--gold-soft) 55%,var(--rose));-webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 8px 60px rgba(233,197,131,.25)}
  #finale .type{min-height:2.4em;font-size:clamp(1.05rem,3vw,1.5rem);font-style:italic;color:var(--ink);margin-top:1.4rem}
  #finale .type .cursor{display:inline-block;width:2px;height:1.1em;background:var(--gold);margin-left:2px;vertical-align:-2px;animation:blink 1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
  .replay{margin-top:2.4rem;font-family:var(--display);letter-spacing:.28em;text-transform:uppercase;font-size:.74rem;color:var(--gold-soft);
    background:transparent;border:1px solid rgba(246,226,179,.4);border-radius:999px;padding:.9em 2em;cursor:pointer;transition:.35s;opacity:0}
  .replay.show{opacity:1}
  .replay:hover{background:rgba(233,197,131,.14);border-color:var(--gold)}

  /* mobile */
  @media (max-width:820px){
    body{overflow:hidden}
    .chapter,.chapter.reverse{grid-template-columns:1fr;grid-template-rows:auto auto;align-content:center;gap:1.4rem;text-align:center;
      padding:calc(3.5rem + env(safe-area-inset-top)) 1.6rem calc(6rem + env(safe-area-inset-bottom))}
    .chapter .photo-col,.chapter.reverse .photo-col{order:1}
    .chapter .text-col,.chapter.reverse .text-col{order:2;max-width:100%;margin:0 auto}
    .frame{max-width:min(64vw,300px)}
    .ch-rule,.chapter.active .ch-rule{margin-left:auto;margin-right:auto}
    @keyframes growRule{to{width:46%}}
    .ch-body{font-size:1.06rem}
  }
  @media (max-height:560px) and (min-width:821px){.frame{max-width:min(60vh,320px)}}

  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001s!important;animation-delay:0s!important;transition-duration:.2s!important}
    .frame img{clip-path:none!important;transform:scale(1.04)!important;filter:none!important}
  }
</style>
</head>
<body>
  <div id="bg"><span class="glow g1"></span><span class="glow g2"></span><span class="glow g3"></span></div>
  <canvas id="stars"></canvas>
  <canvas id="petals"></canvas>
  <div class="vignette"></div>

  <!-- GATE -->
  <section id="gate">
    <div class="moon" aria-hidden="true"></div>
    <h1 class="gate-title">Chandni</h1>
    <p class="gate-sub">for my moonlight — meri chandni</p>
    <button class="openbtn" id="openBtn">Open your heart</button>
    <p class="hint">made with all of mine · use ← → or tap the arrows</p>
  </section>

  <!-- INTRO -->
  <section id="intro" class="wrap">
    <div class="center">
      <p class="kicker">before we begin</p>
      <div class="hairline" style="animation:growHair 1.4s var(--ease) .3s forwards"></div>
      <p id="introText"></p>
    </div>
  </section>

  <!-- STAGE (chapters injected by JS) -->
  <section id="stage"></section>

  <!-- FINALE -->
  <section id="finale" class="wrap">
    <div class="center">
      <p class="kicker">and always</p>
      <div class="hairline" style="width:60%"></div>
      <div class="big">I love you, Chandni</div>
      <p class="type" id="typeLine"><span class="cursor"></span></p>
      <button class="replay" id="replayBtn">relive it from the start</button>
    </div>
  </section>

  <!-- HUD -->
  <div class="counter" id="counter"></div>
  <div id="hud">
    <button class="navbtn" id="prevBtn" aria-label="previous">&#8249;</button>
    <div class="moons" id="moons"></div>
    <button class="navbtn" id="nextBtn" aria-label="next">&#8250;</button>
  </div>

  <style>@keyframes growHair{to{width:120px}}</style>

<script>
/* =========================================================================
   YOUR STORY LIVES HERE.
   Edit the `title`, `body`, and `sign` of each chapter freely.
   - Wrap words in <span class="hl">...</span> to make them glow gold.
   - `img` points to the photo. `reverse:true` puts the photo on the right.
   ========================================================================= */
const CHAPTERS = [
  {
    img:"assets/img/chandni-portrait.jpg",
    index:"Chapter I",
    title:'The girl named <span class="accent">Moonlight</span>',
    body:'Your parents named you Chandni — <span class="hl">moonlight</span> — long before they knew how right they were. On the darkest nights, you are the softest, steadiest light I have. I only have to look at you to feel calm.',
    sign:"— and I never look away",
    reverse:false
  },
  {
    img:"assets/img/collage-birthday.jpg",
    index:"Chapter II",
    title:'A whole <span class="accent">collage</span> of you',
    body:'One frame was never enough for you. Every version of you — dressed up, dressed down, laughing, thinking, mid-sentence — I want them all. This is what my heart looks like on the inside: <span class="hl">completely full of you.</span>',
    sign:"— every single frame is my favourite",
    reverse:true
  },
  {
    img:"assets/img/cycle-garden.jpg",
    index:"Chapter III",
    title:'That <span class="accent">laugh</span>',
    body:'You on that cycle, head thrown back, the whole garden in bloom behind you. This is the laugh I would cross any distance for. When you’re happy like this, <span class="hl">the whole world feels lighter.</span>',
    sign:"— keep laughing, I’ll keep watching",
    reverse:false
  },
  {
    img:"assets/img/cloud-cafe.jpg",
    index:"Chapter IV",
    title:'Under the <span class="accent">clouds</span>',
    body:'Somewhere between the fairy lights and the soft chaos of a good evening, you leaned your head on me and everything went quiet. I remember thinking: <span class="hl">this. this is the life I want.</span>',
    sign:"— dressed up, but you’re the view",
    reverse:true
  },
  {
    img:"assets/img/sultanpur-night.jpg",
    index:"Chapter V",
    title:'Cheek to <span class="accent">cheek</span>',
    body:'The lights strung above us, the whole street glowing, and still — you were the brightest thing there. I could spend a thousand ordinary nights like this and call every one of them <span class="hl">the best night of my life.</span>',
    sign:"— my favourite person in any crowd",
    reverse:false
  },
  {
    img:"assets/img/wedding-gala.jpg",
    index:"Chapter VI",
    title:'All <span class="accent">dressed up</span>',
    body:'You walked in and the whole room dimmed a little, the way a room does when the real light arrives. I stood a little taller that night — not because of where we were, but because <span class="hl">you were on my arm.</span>',
    sign:"— proudest man in the room",
    reverse:true
  },
  {
    img:"assets/img/beach-dinner.jpg",
    index:"Chapter VII",
    title:'Somewhere <span class="accent">far</span>, together',
    body:'New places are only worth it because I get to watch you discover them. Sand underfoot, warm light, your hands folded, that soft look on your face. <span class="hl">Anywhere is home if you’re sitting across from me.</span>',
    sign:"— the whole world, one trip at a time",
    reverse:false
  },
  {
    img:"assets/img/perfume-shop.jpg",
    index:"Chapter VIII",
    title:'Even the <span class="accent">in-between</span>',
    body:'Not every moment is a grand one. Sometimes it’s just you, waiting, a little bored, surrounded by a hundred scents — and I still couldn’t take my eyes off you. <span class="hl">I love the ordinary hours with you most of all.</span>',
    sign:"— you make waiting feel like a gift",
    reverse:true
  },
  {
    img:"assets/img/gold-mirror.jpg",
    index:"Chapter IX",
    title:'You &amp; <span class="accent">me</span>',
    body:'A gold mirror, a stolen selfie, the two of us in black. I look at us here and I don’t see two people — I see <span class="hl">one team, one story, one us.</span> Reflections fade; this doesn’t.',
    sign:"— us, and only ever us",
    reverse:false
  },
  {
    img:"assets/img/portugal-jersey.jpg",
    index:"Chapter X",
    title:'My favourite <span class="accent">teammate</span>',
    body:'Matching jerseys, terrible commentary, you stealing the good snacks. Even when we’re just being silly, I’m so aware of how lucky I am. Win or lose, <span class="hl">I always want to be on your side of the sofa.</span>',
    sign:"— you + me, unbeaten",
    reverse:true
  },
  {
    img:"assets/img/anime-cap.jpg",
    index:"Chapter XI",
    title:'How I <span class="accent">see</span> you',
    body:'If I could draw the way my heart sees you, it would look like this — soft, warm, a little playful, impossibly dear. This is you in my imagination on an ordinary Tuesday. <span class="hl">Even my daydreams are just you.</span>',
    sign:"— forever yours, forever amazed",
    reverse:false
  }
];

const INTRO_TEXT = 'Chandni, I’m not very good at saying big things out loud. So I built you this instead — a quiet little world made only of you. Take your time. <span class="em">There’s no rush when it comes to us.</span>';
const FINALE_LINES = [
  "Thank you for being my calm and my chaos.",
  "For every laugh, every trip, every ordinary evening.",
  "You are my moonlight — and I am, endlessly, yours."
];

/* ===================== ENGINE (no need to edit below) ===================== */
(function(){
  const stage=document.getElementById('stage');
  const gate=document.getElementById('gate');
  const intro=document.getElementById('intro');
  const finale=document.getElementById('finale');
  const hud=document.getElementById('hud');
  const counter=document.getElementById('counter');
  const moonsWrap=document.getElementById('moons');
  const prevBtn=document.getElementById('prevBtn');
  const nextBtn=document.getElementById('nextBtn');
  const roman=n=>['I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII','XIII','XIV'][n]||(n+1);

  // build chapters
  CHAPTERS.forEach((c,i)=>{
    const sec=document.createElement('article');
    sec.className='chapter'+(c.reverse?' reverse':'');
    sec.dataset.i=i;
    sec.innerHTML=`
      <div class="photo-col"><div class="frame"><img src="${c.img}" alt="A memory of Chandni" loading="${i<2?'eager':'lazy'}"></div></div>
      <div class="text-col">
        <div class="ch-index">${c.index||('Chapter '+roman(i))}</div>
        <h2 class="ch-title">${c.title}</h2>
        <div class="ch-rule"></div>
        <p class="ch-body">${c.body}</p>
        <div class="ch-sign">${c.sign||''}</div>
      </div>`;
    stage.appendChild(sec);
    const m=document.createElement('span');m.className='mp';m.dataset.i=i;moonsWrap.appendChild(m);
  });
  const chapters=[...document.querySelectorAll('.chapter')];

  // states: -2 gate, -1 intro, 0..n-1 chapters, n finale
  let idx=-2, busy=false;
  const N=chapters.length;

  function setMoons(active){
    moonsWrap.querySelectorAll('.mp').forEach((m,i)=>{
      m.classList.toggle('filled', i<=active && active>=0);
      m.classList.toggle('current', i===active);
    });
  }

  function showChapter(i){
    chapters.forEach(ch=>ch.classList.remove('active'));
    // force reflow so re-entering a chapter replays animation
    const el=chapters[i]; void el.offsetWidth; el.classList.add('active');
    counter.textContent=`${String(i+1).padStart(2,'0')} · ${String(N).padStart(2,'0')}`;
    setMoons(i);
    prevBtn.disabled=false; nextBtn.disabled=false;
  }

  function go(target){
    if(busy) return;
    target=Math.max(-1,Math.min(N,target));
    if(target===idx) return;
    busy=true; setTimeout(()=>busy=false,650);

    intro.classList.toggle('show', target===-1);
    stage.classList.toggle('show', target>=0 && target<N);
    finale.classList.toggle('show', target===N);
    hud.classList.toggle('show', target>=-1 && target<N);
    counter.classList.toggle('show', target>=0 && target<N);

    if(target>=0 && target<N) showChapter(target);
    if(target===N) runFinale();
    if(target===-1) startIntroText();

    idx=target;
    prevBtn.disabled = idx<=-1;
    nextBtn.disabled = false;
  }

  // buttons / keys / swipe
  nextBtn.addEventListener('click',()=>go(idx+1));
  prevBtn.addEventListener('click',()=>go(idx-1));
  window.addEventListener('keydown',e=>{
    if(gate.classList.contains('gone')===false) { if(e.key==='Enter'||e.key===' ') openGate(); return; }
    if(e.key==='ArrowRight'||e.key==='PageDown') go(idx+1);
    if(e.key==='ArrowLeft'||e.key==='PageUp') go(idx-1);
  });
  let tsx=0,tsy=0;
  window.addEventListener('touchstart',e=>{tsx=e.changedTouches[0].clientX;tsy=e.changedTouches[0].clientY;},{passive:true});
  window.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-tsx, dy=e.changedTouches[0].clientY-tsy;
    if(Math.abs(dx)>55 && Math.abs(dx)>Math.abs(dy)){ go(idx + (dx<0?1:-1)); }
  },{passive:true});
  // wheel (debounced) for desktop scroll
  let wlock=false;
  window.addEventListener('wheel',e=>{
    if(idx<-1) return;
    if(wlock) return; if(Math.abs(e.deltaY)<12) return;
    wlock=true; setTimeout(()=>wlock=false,700);
    go(idx + (e.deltaY>0?1:-1));
  },{passive:true});

  // parallax tilt on active frame
  window.addEventListener('mousemove',e=>{
    const f=document.querySelector('.chapter.active .frame'); if(!f) return;
    const rx=(e.clientY/innerHeight-.5)*-6, ry=(e.clientX/innerWidth-.5)*8;
    f.style.transform=`rotateX(${rx}deg) rotateY(${ry}deg)`;
  });

  // intro typing-ish reveal
  const introText=document.getElementById('introText');
  let introStarted=false;
  function startIntroText(){
    if(introStarted) return; introStarted=true;
    introText.innerHTML=INTRO_TEXT;
    introText.style.opacity=0; introText.style.transform='translateY(18px)';
    introText.style.transition='opacity 1.6s var(--ease) .5s, transform 1.6s var(--ease) .5s';
    requestAnimationFrame(()=>{introText.style.opacity=1;introText.style.transform='none';});
  }

  // finale typewriter
  const typeLine=document.getElementById('typeLine');
  const replayBtn=document.getElementById('replayBtn');
  let finaleRun=false;
  function runFinale(){
    if(finaleRun) return; finaleRun=true;
    burst();
    let li=0;
    function nextLine(){
      if(li>=FINALE_LINES.length){ replayBtn.classList.add('show'); return; }
      const text=FINALE_LINES[li]; let ci=0;
      typeLine.innerHTML='<span class="cursor"></span>';
      const tick=setInterval(()=>{
        ci++;
        typeLine.innerHTML=text.slice(0,ci)+'<span class="cursor"></span>';
        if(ci>=text.length){ clearInterval(tick); li++; setTimeout(nextLine,1100); }
      },42);
    }
    setTimeout(nextLine,700);
  }
  replayBtn.addEventListener('click',()=>{ finaleRun=false; replayBtn.classList.remove('show'); go(-1); });

  // gate
  function openGate(){
    gate.classList.add('gone');
    setTimeout(()=>go(-1),700);
  }
  document.getElementById('openBtn').addEventListener('click',openGate);

  /* ---------- starfield ---------- */
  const sc=document.getElementById('stars'), sx=sc.getContext('2d');
  let stars=[];
  function initStars(){
    sc.width=innerWidth; sc.height=innerHeight;
    const n=Math.min(150, Math.floor(innerWidth*innerHeight/9000));
    stars=Array.from({length:n},()=>({x:Math.random()*sc.width,y:Math.random()*sc.height,
      r:Math.random()*1.3+.2,tw:Math.random()*Math.PI*2,sp:Math.random()*.02+.005}));
  }
  function drawStars(){
    sx.clearRect(0,0,sc.width,sc.height);
    for(const s of stars){ s.tw+=s.sp; const a=.35+Math.sin(s.tw)*.35;
      sx.beginPath(); sx.arc(s.x,s.y,s.r,0,7); sx.fillStyle=`rgba(255,246,224,${a})`; sx.fill(); }
    requestAnimationFrame(drawStars);
  }

  /* ---------- floating petals / motes ---------- */
  const pc=document.getElementById('petals'), px=pc.getContext('2d');
  let motes=[];
  function initPetals(){
    pc.width=innerWidth; pc.height=innerHeight;
    const n=Math.min(34, Math.floor(innerWidth/40));
    motes=Array.from({length:n},()=>spawn(true));
  }
  function spawn(rand){
    return {x:Math.random()*pc.width, y:rand?Math.random()*pc.height:pc.height+20,
      s:Math.random()*7+3, vy:-(Math.random()*.35+.12), vx:(Math.random()-.5)*.35,
      rot:Math.random()*Math.PI, vr:(Math.random()-.5)*.02, a:Math.random()*.5+.25,
      hue:Math.random()<.5?'233,197,131':'231,155,180'};
  }
  function drawPetals(){
    px.clearRect(0,0,pc.width,pc.height);
    for(const m of motes){
      m.x+=m.vx; m.y+=m.vy; m.rot+=m.vr; m.x+=Math.sin(m.y*.01)*.3;
      if(m.y<-20||m.x<-30||m.x>pc.width+30){ Object.assign(m,spawn(false)); }
      px.save(); px.translate(m.x,m.y); px.rotate(m.rot);
      px.beginPath();
      px.ellipse(0,0,m.s,m.s*.55,0,0,7);
      px.fillStyle=`rgba(${m.hue},${m.a})`; px.shadowColor=`rgba(${m.hue},.6)`; px.shadowBlur=8; px.fill();
      px.restore();
    }
    requestAnimationFrame(drawPetals);
  }

  // celebratory burst at finale
  function burst(){
    for(let i=0;i<40;i++){ const m=spawn(false); m.y=pc.height*.5; m.x=pc.width*.5;
      m.vy=-(Math.random()*2+.5); m.vx=(Math.random()-.5)*4; m.a=.8; motes.push(m); }
    if(motes.length>90) motes.splice(0,motes.length-90);
  }

  function resize(){ initStars(); initPetals(); }
  window.addEventListener('resize',()=>{ clearTimeout(window._rz); window._rz=setTimeout(resize,200); });

  initStars(); initPetals();
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  drawStars(); if(!reduce) drawPetals();

  // preload chapter images
  CHAPTERS.forEach(c=>{ const im=new Image(); im.src=c.img; });
})();
</script>
</body>
</html>
